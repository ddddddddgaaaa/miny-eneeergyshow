<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>МИНЫ ОТ vadyms22</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.15);
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            transition: all 0.2s;
        }

        .left-panel {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-panel {
            flex: 2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .panel-card {
            border-radius: 32px;
            padding: 20px;
            border: 1px solid;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .menu-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .menu-label { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

        .input-field {
            border-radius: 40px;
            padding: 10px 16px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            outline: none;
            width: 100%;
            border: 1px solid;
        }

        /* Слайдер для размера поля */
        .size-slider-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .size-slider {
            -webkit-appearance: none;
            flex: 1;
            height: 8px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            background: rgba(180,138,255,0.3);
        }
        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff5e8e, #b5185a);
            box-shadow: 0 0 8px #ff5e8e;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .size-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .size-value-badge {
            min-width: 56px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(180,138,255,0.2);
            border: 1px solid #b48aff;
        }

        .button-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }

        .option-btn {
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid;
            background: rgba(0,0,0,0.2);
        }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }

        .play-btn {
            background: radial-gradient(circle at 30% 10%, #ff5e8e, #b5185a);
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff0f5;
            text-shadow: 0 0 5px #ff0095;
            box-shadow: 0 0 12px #ff5e8e;
        }
        .cashout-btn { background: radial-gradient(circle at 30% 10%, #2ee68a, #0e8248); border: none; font-size: 1.1rem; }
        .double-btn { background: radial-gradient(circle at 30% 10%, #ffb347, #d4650a); border: none; font-size: 1.1rem; }
        .theme-btn { background: linear-gradient(135deg, #7f6bc2, #5e43a3); border: 1px solid #e5ccff; }

        .stats-grid { display: flex; flex-direction: column; gap: 14px; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 18px;
            border-radius: 40px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.2);
        }
        .win-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e2ff7a, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info-text { font-weight: bold; }

        /* Игровое поле */
        .grid-wrapper {
            width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
        }

        .grid {
            display: grid;
            gap: 6px;
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 32px;
            border: 1px solid #b48aff;
            transition: transform 0.1s ease;
        }

        .grid.shake {
            animation: shake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shake {
            0%   { transform: translate(1px, 1px) rotate(0deg); }
            10%  { transform: translate(-1px, -2px) rotate(-1deg); }
            20%  { transform: translate(-3px, 0px) rotate(1deg); }
            30%  { transform: translate(3px, 2px) rotate(0deg); }
            40%  { transform: translate(1px, -1px) rotate(1deg); }
            50%  { transform: translate(-1px, 2px) rotate(-1deg); }
            60%  { transform: translate(-3px, 1px) rotate(0deg); }
            70%  { transform: translate(3px, 1px) rotate(-1deg); }
            80%  { transform: translate(-1px, -1px) rotate(1deg); }
            90%  { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .cell {
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #c7a5ff;
            text-shadow: 0 0 3px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(2px);
        }

        .cell.revealed {
            box-shadow: inset 0 0 10px #dbb0ff, 0 0 6px #c58eff;
            transform: scale(0.95);
            cursor: default;
        }

        .cell.mine-reveal { box-shadow: inset 0 0 15px #ff5e8e; }

        .cell.highlight {
            animation: gentleGreenGlow 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes gentleGreenGlow {
            0%   { background: rgba(76,175,80,0.2); box-shadow: 0 0 0px #4caf50; transform: scale(1); }
            25%  { background: #4caf50; box-shadow: 0 0 18px #8bc34a, 0 0 8px #4caf50; transform: scale(0.96); }
            50%  { background: #66bb6a; box-shadow: 0 0 28px #7cb342, 0 0 12px #4caf50; transform: scale(0.98); }
            75%  { background: #81c784; box-shadow: 0 0 18px #8bc34a; transform: scale(0.97); }
            100% { background: rgba(76,175,80,0); box-shadow: 0 0 0px #4caf50; transform: scale(1); }
        }

        .status-text {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            border-radius: 28px;
            background: rgba(0,0,0,0.3);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Рулетка */
        .roulette-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            font-family: 'Orbitron', monospace;
        }
        .roulette-card {
            border-radius: 48px; padding: 20px; text-align: center;
            border: 2px solid gold;
            box-shadow: 0 0 40px rgba(255,215,0,0.5);
            width: 360px;
            background: #1e1a3a;
            color: white;
        }
        canvas { margin: 15px auto; display: block; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .spin-roulette-btn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #d4650a);
            border: none; padding: 10px 20px; border-radius: 40px;
            font-weight: bold; margin: 10px 5px; cursor: pointer;
            color: white; font-family: 'Orbitron', monospace;
        }
        .close-roulette {
            background: gold; border: none; padding: 10px 20px; border-radius: 40px;
            font-weight: bold; margin: 10px 5px; cursor: pointer; color: black;
        }

        @media (max-width: 850px) {
            .game-container { flex-direction: column; }
            .cell { font-size: 0.6rem; }
        }

        /* Темы */
        body.dark { background: linear-gradient(145deg, #1e1a3a, #2a2448); }
        body.dark .game-container { background: rgba(45,35,75,0.75); border-color: #bf9eff; }
        body.dark .panel-card { background: #2d2350dd; border-color: #bf9eff; }
        body.dark .menu-label, body.dark .info-text, body.dark .stat-row { color: #f0eaff; }
        body.dark .input-field { background: #1f1940; border-color: #b77eff; color: #ffffff; }
        body.dark .option-btn { background: #3a2b60cc; border-color: #c49eff; color: #ffffff; }
        body.dark .cell { background: radial-gradient(ellipse at 30% 35%, #463b75, #2a1f4e); box-shadow: 0 3px 0 #2a1b55; color: #ffffff; }
        body.dark .status-text { background: #1f1940aa; color: #ffffff; }
        body.dark .size-value-badge { color: #f0eaff; }
        body.dark .size-slider { background: rgba(180,138,255,0.3); }

        body.light { background: linear-gradient(145deg, #e6e0f5, #d9cef0); }
        body.light .game-container { background: #f5efffdd; border-color: #b48aff; }
        body.light .panel-card { background: #faf5ffdd; border-color: #b48aff; }
        body.light .menu-label, body.light .info-text { color: #2a1a5e; }
        body.light .input-field { background: #ffffffcc; border-color: #9b6eff; color: #2d1b5e; }
        body.light .option-btn { background: #d9caffcc; border-color: #8c6ad6; color: #2d1b5e; }
        body.light .cell { background: radial-gradient(ellipse at 30% 35%, #f0e9ff, #d9caff); box-shadow: 0 3px 0 #9f86d6; color: #1f0e42; }
        body.light .status-text { background: #e2d6ffaa; color: #2a1a5e; }
        body.light .size-value-badge { color: #2a1a5e; }

        body.neon { background: linear-gradient(145deg, #0a0f2a, #0b0a20); }
        body.neon .game-container { background: #0f0c26cc; border-color: #ff44e6; box-shadow: 0 0 15px #ff44e6; }
        body.neon .panel-card { background: #1a0e30cc; border-color: #ff44e6; }
        body.neon .menu-label, body.neon .info-text, body.neon .stat-row { color: #ffffff; text-shadow: 0 0 3px #ff44e6; }
        body.neon .input-field { background: #1f1140; border-color: #ff66ff; color: #ffffff; }
        body.neon .option-btn { background: #3b1b66cc; border-color: #ff88ff; color: #ffffff; }
        body.neon .cell { background: radial-gradient(ellipse at 30% 35%, #6a2e8a, #3a1a60); box-shadow: 0 3px 0 #ff44e6; border-color: #ff88ff; color: #ffffff; }
        body.neon .status-text { background: #1a0e30aa; color: #ffffff; border: 1px solid #ff44e6; }
        body.neon .size-value-badge { color: #ffffff; border-color: #ff44e6; background: rgba(255,68,230,0.15); }

        body.mint { background: linear-gradient(145deg, #b8f2e6, #9fe0d9); }
        body.mint .game-container { background: #c4f2ead9; border-color: #2baa8f; }
        body.mint .panel-card { background: #dcfff7dd; border-color: #2baa8f; }
        body.mint .menu-label, body.mint .info-text { color: #1b5c4f; }
        body.mint .input-field { background: #ffffffcc; border-color: #2baa8f; color: #1e5a4f; }
        body.mint .option-btn { background: #b2e6dbcc; border-color: #2baa8f; color: #1b5c4f; }
        body.mint .cell { background: radial-gradient(ellipse at 30% 35%, #c5fff0, #a3f0e0); box-shadow: 0 3px 0 #2baa8f; color: #0e4a3e; border-color: #3ecfb0; }
        body.mint .status-text { background: #d4fff5aa; color: #1a6b5c; }
        body.mint .size-value-badge { color: #1b5c4f; border-color: #2baa8f; }
    </style>
</head>
<body class="dark">
<div class="game-container">
    <div class="left-panel">
        <div class="panel-card">
            <!-- Размер поля -->
            <div class="menu-group">
                <div class="menu-label">🔲 РАЗМЕР ПОЛЯ (NxN)</div>
                <div class="size-slider-wrap">
                    <input type="range" id="sizeSlider" class="size-slider" min="3" max="12" value="6" step="1">
                    <div class="size-value-badge" id="sizeBadge">6×6</div>
                </div>
            </div>
            <!-- Мины -->
            <div class="menu-group">
                <div class="menu-label">💣 КОЛИЧЕСТВО МИН</div>
                <input type="number" id="minesInput" class="input-field" min="1" value="5" step="1">
                <div class="menu-label" id="minesHint" style="font-size:0.7rem;opacity:0.7;">макс. 31 из 36 ячеек</div>
            </div>
            <!-- Награда -->
            <div class="menu-group">
                <div class="menu-label">💰 НАГРАДА ЗА ЯЧЕЙКУ (₽)</div>
                <input type="number" id="rewardInput" class="input-field" min="1" step="1" value="10">
            </div>
            <div class="button-group">
                <button id="startGameBtn" class="option-btn play-btn">🎮 НОВАЯ ИГРА</button>
                <button id="cashoutBtn" class="option-btn cashout-btn" disabled>💎 ЗАБРАТЬ</button>
                <button id="doubleBtn" class="option-btn double-btn" disabled>🎡 РУЛЕТКА x2</button>
            </div>
            <div class="button-group">
                <button id="themeDark" class="option-btn theme-btn">🌑 Тёмная</button>
                <button id="themeLight" class="option-btn theme-btn">☀️ Светлая</button>
                <button id="themeNeon" class="option-btn theme-btn">💜 Неон</button>
                <button id="themeMint" class="option-btn theme-btn">🍃 Мятная</button>
            </div>
        </div>

        <div class="panel-card stats-grid">
            <div class="stat-row">
                <span class="info-text">✨ ТЕКУЩИЙ ВЫИГРЫШ:</span>
                <span class="win-value" id="currentWin">0</span> ₽
            </div>
            <div class="stat-row">
                <span class="info-text">💣 МИН НА ПОЛЕ:</span>
                <span id="minesCountDisplay" class="info-text">5</span>
            </div>
            <div class="stat-row">
                <span class="info-text">💎 ОТКРЫТО БЕЗОПАСНЫХ:</span>
                <span id="openedSafeDisplay" class="info-text">0</span>
                <span id="totalSafeDisplay" class="info-text">/ 31</span>
            </div>
        </div>
        <div class="status-text" id="gameStatus">⚡ Настрой игру и нажми "НОВАЯ ИГРА"</div>
    </div>

    <div class="right-panel">
        <div class="grid-wrapper">
            <div class="grid" id="mineGrid"></div>
        </div>
    </div>
</div>

<script>
    let BOARD_SIZE = 6;
    let TOTAL_CELLS = 36;
    let currentWin = 0;
    let rewardPerCell = 10;
    let selectedMines = 5;
    let gameActive = false;
    let board = [];
    let openedSafeCount = 0;
    let totalSafeCells = TOTAL_CELLS - selectedMines;

    const currentWinSpan   = document.getElementById('currentWin');
    const minesCountDisplay = document.getElementById('minesCountDisplay');
    const openedSafeDisplay = document.getElementById('openedSafeDisplay');
    const totalSafeDisplay  = document.getElementById('totalSafeDisplay');
    const gameStatusSpan    = document.getElementById('gameStatus');
    const startBtn          = document.getElementById('startGameBtn');
    const cashoutBtn        = document.getElementById('cashoutBtn');
    const doubleBtn         = document.getElementById('doubleBtn');
    const minesInput        = document.getElementById('minesInput');
    const rewardInput       = document.getElementById('rewardInput');
    const gridContainer     = document.getElementById('mineGrid');
    const sizeSlider        = document.getElementById('sizeSlider');
    const sizeBadge         = document.getElementById('sizeBadge');
    const minesHint         = document.getElementById('minesHint');

    // Обновляем подсказку при смене размера
    sizeSlider.addEventListener('input', () => {
        const n = parseInt(sizeSlider.value);
        sizeBadge.textContent = n + '×' + n;
        const total = n * n;
        const maxMines = total - 1;
        minesHint.textContent = `макс. ${maxMines} из ${total} ячеек`;
        // Ограничим мины если надо
        if (parseInt(minesInput.value) > maxMines) minesInput.value = maxMines;
        minesInput.max = maxMines;
        if (!gameActive) BOARD_SIZE = n;
    });

    function getCellSize(boardSize) {
        // Адаптивный размер ячейки
        if (boardSize <= 5)  return 68;
        if (boardSize <= 6)  return 60;
        if (boardSize <= 7)  return 52;
        if (boardSize <= 8)  return 46;
        if (boardSize <= 9)  return 42;
        if (boardSize <= 10) return 38;
        if (boardSize <= 11) return 34;
        return 30;
    }

    function getCellFontSize(boardSize) {
        if (boardSize <= 6)  return '0.9rem';
        if (boardSize <= 8)  return '0.75rem';
        if (boardSize <= 10) return '0.65rem';
        return '0.55rem';
    }

    function updateUI() {
        currentWinSpan.innerText = currentWin.toFixed(2);
        openedSafeDisplay.innerText = openedSafeCount;
        totalSafeDisplay.innerText  = '/ ' + totalSafeCells;
        cashoutBtn.disabled = !(gameActive && currentWin > 0);
        doubleBtn.disabled  = !(gameActive && currentWin > 0);
    }

    function generateBoard(minesCount) {
        const b = Array(BOARD_SIZE).fill().map(() =>
            Array(BOARD_SIZE).fill().map(() => ({ isMine: false, revealed: false }))
        );
        const mineSet = new Set();
        while (mineSet.size < minesCount) mineSet.add(Math.floor(Math.random() * TOTAL_CELLS));
        for (let i = 0; i < BOARD_SIZE; i++)
            for (let j = 0; j < BOARD_SIZE; j++)
                if (mineSet.has(i * BOARD_SIZE + j)) b[i][j].isMine = true;
        return b;
    }

    function renderGrid() {
        const cellSize = getCellSize(BOARD_SIZE);
        const fontSize = getCellFontSize(BOARD_SIZE);
        gridContainer.style.gridTemplateColumns = `repeat(${BOARD_SIZE}, ${cellSize}px)`;
        gridContainer.innerHTML = '';
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                const cell = board[i][j];
                const cellNum = i * BOARD_SIZE + j + 1;
                const div = document.createElement('div');
                div.classList.add('cell');
                div.style.width  = cellSize + 'px';
                div.style.height = cellSize + 'px';
                div.style.fontSize = fontSize;
                if (cell.revealed) {
                    div.classList.add('revealed');
                    if (cell.isMine) { div.classList.add('mine-reveal'); div.innerText = '💣'; }
                    else { div.innerText = `${rewardPerCell}₽`; }
                } else {
                    div.innerText = cellNum;
                }
                div.addEventListener('click', (function(r, c) { return () => onCellClick(r, c); })(i, j));
                gridContainer.appendChild(div);
            }
        }
    }

    function highlightCell(row, col) {
        const idx = row * BOARD_SIZE + col;
        const div = gridContainer.children[idx];
        if (!div) return;
        div.classList.remove('highlight');
        void div.offsetWidth;
        div.classList.add('highlight');
        setTimeout(() => div.classList.remove('highlight'), 800);
    }

    function revealAllMines() {
        for (let i = 0; i < BOARD_SIZE; i++)
            for (let j = 0; j < BOARD_SIZE; j++)
                if (board[i][j].isMine) board[i][j].revealed = true;
        renderGrid();
    }

    function shakeGrid() {
        gridContainer.classList.add('shake');
        setTimeout(() => gridContainer.classList.remove('shake'), 300);
    }

    function loseGame() {
        if (!gameActive) return;
        gameActive = false;
        shakeGrid();
        revealAllMines();
        gameStatusSpan.innerText = `💥 ВЗРЫВ! Вы наступили на мину. Потеряно ${currentWin.toFixed(2)} ₽`;
        currentWin = 0;
        updateUI();
    }

    function cashout() {
        if (!gameActive) { gameStatusSpan.innerText = '❌ Нет активной игры.'; return; }
        if (currentWin <= 0) { gameStatusSpan.innerText = '❌ Нечего забирать.'; return; }
        gameStatusSpan.innerText = `💰 Вы забрали ${currentWin.toFixed(2)} ₽. Отличная игра!`;
        currentWin = 0;
        gameActive = false;
        updateUI();
        for (let i = 0; i < BOARD_SIZE; i++)
            for (let j = 0; j < BOARD_SIZE; j++)
                board[i][j].revealed = true;
        renderGrid();
    }

    // ---- РУЛЕТКА ----
    let rouletteCanvas = null, rouletteCtx = null;
    let rouletteSpinning = false;
    let rouletteCurrentAngle = 0;

    const sectors = [
        { label: 'x2', color: '#4CAF50', value: 'win' },
        { label: '0',  color: '#F44336', value: 'lose' }
    ];
    const sectorAngle = (Math.PI * 2) / sectors.length;

    function drawRouletteWheel(angle) {
        if (!rouletteCtx) return;
        const cx = rouletteCanvas.width/2, cy = rouletteCanvas.height/2, r = 140;
        rouletteCtx.clearRect(0, 0, rouletteCanvas.width, rouletteCanvas.height);
        for (let i = 0; i < sectors.length; i++) {
            const s = angle + i * sectorAngle, e = s + sectorAngle;
            rouletteCtx.beginPath(); rouletteCtx.arc(cx, cy, r, s, e); rouletteCtx.lineTo(cx, cy);
            rouletteCtx.fillStyle = sectors[i].color; rouletteCtx.fill();
            rouletteCtx.save(); rouletteCtx.translate(cx, cy); rouletteCtx.rotate(s + sectorAngle/2);
            rouletteCtx.fillStyle = '#fff'; rouletteCtx.font = 'bold 24px Orbitron'; rouletteCtx.fillText(sectors[i].label, r-45, 10);
            rouletteCtx.restore();
        }
        rouletteCtx.beginPath(); rouletteCtx.arc(cx, cy, 20, 0, 2*Math.PI);
        rouletteCtx.fillStyle = '#333'; rouletteCtx.fill();
        rouletteCtx.strokeStyle = '#ffd700'; rouletteCtx.lineWidth = 3; rouletteCtx.stroke();
        rouletteCtx.beginPath();
        rouletteCtx.moveTo(cx+12, cy-r-5); rouletteCtx.lineTo(cx-12, cy-r-5); rouletteCtx.lineTo(cx, cy-r-22);
        rouletteCtx.fillStyle = '#ffd700'; rouletteCtx.fill();
    }

    function getSectorUnderPointer(angle) {
        const ptr = ((-Math.PI/2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
        for (let i = 0; i < sectors.length; i++) {
            let ns = ((angle + i*sectorAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
            let ne = ((angle + (i+1)*sectorAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
            if (ns < ne ? (ptr >= ns && ptr < ne) : (ptr >= ns || ptr < ne)) return sectors[i];
        }
        return sectors[0];
    }

    function startRouletteSpin(callback) {
        if (rouletteSpinning) return;
        rouletteSpinning = true;
        const totalAngle = (5 + Math.random()*5) * 2*Math.PI;
        const startAngle = rouletteCurrentAngle;
        const duration = 1500;
        const startTime = performance.now();
        (function animate(now) {
            const t = Math.min(1, (now - startTime) / duration);
            const ease = 1 - Math.pow(1-t, 3);
            drawRouletteWheel(startAngle + totalAngle * ease);
            if (t < 1) { requestAnimationFrame(animate); return; }
            rouletteCurrentAngle = (startAngle + totalAngle) % (2*Math.PI);
            drawRouletteWheel(rouletteCurrentAngle);
            rouletteSpinning = false;
            setTimeout(() => callback(getSectorUnderPointer(rouletteCurrentAngle).value === 'win'), 200);
        })(startTime);
    }

    function showRoulette(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'roulette-overlay';
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 300;
        rouletteCanvas = canvas; rouletteCtx = canvas.getContext('2d');
        drawRouletteWheel(rouletteCurrentAngle);
        const card = document.createElement('div');
        card.className = 'roulette-card';
        card.innerHTML = '<h3>🎡 КОЛЕСО ФОРТУНЫ 🎡</h3>';
        card.appendChild(canvas);
        const spinBtn = document.createElement('button');
        spinBtn.innerText = 'КРУТИТЬ'; spinBtn.className = 'spin-roulette-btn';
        const closeBtn = document.createElement('button');
        closeBtn.innerText = 'ЗАКРЫТЬ'; closeBtn.className = 'close-roulette';
        spinBtn.onclick = () => {
            if (rouletteSpinning) return;
            startRouletteSpin(result => { callback(result); overlay.remove(); });
        };
        closeBtn.onclick = () => { if (!rouletteSpinning) overlay.remove(); };
        card.appendChild(spinBtn); card.appendChild(closeBtn);
        overlay.appendChild(card); document.body.appendChild(overlay);
    }

    function doubleOrNothing() {
        if (!gameActive || currentWin <= 0) { gameStatusSpan.innerText = '❌ Нечего удваивать.'; return; }
        showRoulette(isWin => {
            if (isWin) {
                currentWin *= 2;
                updateUI();
                gameStatusSpan.innerText = `🎉 УДАЧА! Выигрыш удвоен: ${currentWin.toFixed(2)} ₽`;
            } else {
                gameStatusSpan.innerText = `💔 Неудача! Потеряно ${currentWin.toFixed(2)} ₽. Раунд окончен.`;
                currentWin = 0; gameActive = false;
                updateUI(); revealAllMines();
            }
        });
    }

    function onCellClick(row, col) {
        if (!gameActive) return;
        const cell = board[row][col];
        if (cell.revealed) return;
        if (cell.isMine) { loseGame(); return; }
        highlightCell(row, col);
        cell.revealed = true;
        openedSafeCount++;
        currentWin += rewardPerCell;
        updateUI();
        renderGrid();
        if (openedSafeCount === totalSafeCells) {
            gameStatusSpan.innerText = `✨ ПОБЕДА! Все ячейки открыты! Выигрыш: ${currentWin.toFixed(2)} ₽ ✨`;
            return;
        }
        gameStatusSpan.innerText = `💎 +${rewardPerCell} ₽ | Выигрыш: ${currentWin.toFixed(2)} ₽`;
    }

    function startNewGame() {
        BOARD_SIZE = parseInt(sizeSlider.value);
        TOTAL_CELLS = BOARD_SIZE * BOARD_SIZE;

        let mines = parseInt(minesInput.value);
        if (isNaN(mines)) mines = 5;
        mines = Math.min(TOTAL_CELLS - 1, Math.max(1, mines));
        minesInput.value = mines;
        selectedMines = mines;

        let reward = parseFloat(rewardInput.value);
        if (isNaN(reward) || reward <= 0) reward = 10;
        rewardInput.value = reward;
        rewardPerCell = reward;

        gameActive = true;
        openedSafeCount = 0;
        currentWin = 0;
        totalSafeCells = TOTAL_CELLS - selectedMines;
        minesCountDisplay.innerText = selectedMines;
        board = generateBoard(selectedMines);
        renderGrid();
        updateUI();
        gameStatusSpan.innerText = `🎲 ПОЛЕ ${BOARD_SIZE}×${BOARD_SIZE} | Мин: ${selectedMines} | ${rewardPerCell} ₽/ячейку. Удачи!`;
    }

    function setTheme(t) { document.body.className = t; }

    // Инициализация
    sizeSlider.addEventListener('input', () => {
        const n = parseInt(sizeSlider.value);
        sizeBadge.textContent = n + '×' + n;
        minesHint.textContent = `макс. ${n*n-1} из ${n*n} ячеек`;
        minesInput.max = n*n - 1;
    });

    startBtn.addEventListener('click', () => { if (gameActive) gameActive = false; startNewGame(); });
    cashoutBtn.addEventListener('click', cashout);
    doubleBtn.addEventListener('click', doubleOrNothing);
    document.getElementById('themeDark').addEventListener('click', () => setTheme('dark'));
    document.getElementById('themeLight').addEventListener('click', () => setTheme('light'));
    document.getElementById('themeNeon').addEventListener('click', () => setTheme('neon'));
    document.getElementById('themeMint').addEventListener('click', () => setTheme('mint'));

    // Старт
    BOARD_SIZE = 6; TOTAL_CELLS = 36;
    board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill().map(() => ({ isMine: false, revealed: false })));
    renderGrid(); updateUI();
    minesCountDisplay.innerText = 5;
    sizeBadge.textContent = '6×6';
    minesHint.textContent = 'макс. 35 из 36 ячеек';
    minesInput.max = 35;
    setTheme('dark');
</script>
</body>
</html>
